<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Analyzer — Lovable/Supabase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E0D0B; --ink: #EFEBDC; --clay: #E89A7A; --green: #9CB29A;
    --muted: #7A7466; --surface: #1A1916; --border: #2E2C28;
    --critical: #E87A7A; --high: #E8B67A; --medium: #E8D97A; --low: #9CB29A; --info: #7A9CB2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'Bricolage Grotesque', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 860px; margin: 0 auto; }
  header { margin-bottom: 3rem; }
  h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
  h1 span { color: var(--clay); }
  .subtitle { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; }

  .form-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
  .input-row { display: flex; gap: 0.75rem; }
  input[type="url"] {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 0.625rem 0.875rem; color: var(--ink); font-family: 'IBM Plex Mono', monospace;
    font-size: 0.875rem; outline: none;
  }
  input[type="url"]:focus { border-color: var(--clay); }
  input[type="url"]::placeholder { color: var(--muted); }
  button.primary {
    background: var(--clay); color: var(--bg); border: none; border-radius: 6px;
    padding: 0.625rem 1.25rem; font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 0.875rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  button.primary:hover { filter: brightness(1.1); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  #status-box { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--clay); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status-text { font-family: 'IBM Plex Mono', monospace; font-size: 0.875rem; color: var(--muted); }

  .score-bar { margin-bottom: 2rem; }
  .score-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
  .score-label { font-size: 0.75rem; font-family: 'IBM Plex Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .score-value { font-size: 2rem; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
  .score-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  .badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .badge { padding: 0.25rem 0.625rem; border-radius: 4px; font-size: 0.75rem; font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .badge-critical { background: rgba(232,122,122,0.15); color: var(--critical); border: 1px solid rgba(232,122,122,0.3); }
  .badge-high { background: rgba(232,182,122,0.15); color: var(--high); border: 1px solid rgba(232,182,122,0.3); }
  .badge-medium { background: rgba(232,217,122,0.15); color: var(--medium); border: 1px solid rgba(232,217,122,0.3); }
  .badge-low { background: rgba(156,178,154,0.15); color: var(--low); border: 1px solid rgba(156,178,154,0.3); }
  .badge-info { background: rgba(122,156,178,0.15); color: var(--info); border: 1px solid rgba(122,156,178,0.3); }

  .section-title { font-size: 0.75rem; font-family: 'IBM Plex Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
  .findings { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
  .finding-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .finding-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; cursor: pointer; }
  .finding-header:hover { background: rgba(255,255,255,0.02); }
  .severity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-critical { background: var(--critical); }
  .dot-high { background: var(--high); }
  .dot-medium { background: var(--medium); }
  .dot-low { background: var(--low); }
  .dot-info { background: var(--info); }
  .finding-title { flex: 1; font-size: 0.875rem; }
  .finding-sev-label { font-size: 0.7rem; font-family: 'IBM Plex Mono', monospace; color: var(--muted); }
  .finding-body { padding: 0 1rem 1rem; display: none; border-top: 1px solid var(--border); }
  .finding-body.open { display: block; }
  .finding-body p { font-size: 0.8rem; color: var(--muted); margin-top: 0.75rem; line-height: 1.5; }
  .finding-body p strong { color: var(--ink); }
  .evidence { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 0.5rem 0.75rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--clay); margin-top: 0.5rem; overflow-x: auto; white-space: pre; }

  .prompts-section { margin-bottom: 2rem; }
  .prompts-actions { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  button.secondary {
    background: transparent; color: var(--ink); border: 1px solid var(--border); border-radius: 6px;
    padding: 0.5rem 1rem; font-family: 'Bricolage Grotesque', sans-serif; font-size: 0.8rem;
    cursor: pointer;
  }
  button.secondary:hover { border-color: var(--clay); color: var(--clay); }
  .prompts-content { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; line-height: 1.7; white-space: pre-wrap; color: var(--ink); max-height: 480px; overflow-y: auto; }

  .hidden { display: none !important; }
  #report-section { display: none; }
  .error-msg { color: var(--critical); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>security <span>analyzer</span></h1>
    <p class="subtitle">lovable · supabase · análise pública anônima</p>
  </header>

  <div class="form-box">
    <div class="input-row">
      <input type="url" id="url-input" placeholder="https://meuapp.lovable.app" autocomplete="off">
      <button class="primary" id="analyze-btn" onclick="startAnalysis()">Analisar</button>
    </div>
    <p class="error-msg hidden" id="form-error"></p>
  </div>

  <div id="status-box">
    <span class="spinner"></span>
    <span id="status-text">Iniciando análise...</span>
  </div>

  <div id="report-section">
    <div class="score-bar">
      <div class="score-header">
        <span class="score-label">Score de risco</span>
        <span class="score-value" id="score-value">0</span>
      </div>
      <div class="score-track">
        <div class="score-fill" id="score-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="badges" id="badges-row"></div>

    <p class="section-title">Findings</p>
    <div class="findings" id="findings-list"></div>

    <div class="prompts-section">
      <p class="section-title">Prompts para o Lovable</p>
      <div class="prompts-actions">
        <button class="secondary" onclick="copyPrompts()">Copiar todos</button>
        <button class="secondary" onclick="downloadReport()">Baixar .md</button>
      </div>
      <div class="prompts-content" id="prompts-content"></div>
    </div>
  </div>
</div>

<script>
let currentReportId = null
let currentReport = null
let pollTimer = null

function showError(msg) {
  const el = document.getElementById('form-error')
  el.textContent = msg
  el.classList.remove('hidden')
}

function clearError() {
  document.getElementById('form-error').classList.add('hidden')
}

async function startAnalysis() {
  const url = document.getElementById('url-input').value.trim()
  if (!url.startsWith('http')) {
    showError('Informe uma URL válida começando com https://')
    return
  }
  clearError()

  document.getElementById('analyze-btn').disabled = true
  document.getElementById('report-section').style.display = 'none'
  document.getElementById('status-box').style.display = 'block'
  document.getElementById('status-text').textContent = 'Enviando URL...'

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    })
    const data = await res.json()
    if (!res.ok) { showError(data.error); resetBtn(); return }
    currentReportId = data.id
    pollStatus()
  } catch (err) {
    showError('Erro ao conectar com o servidor.')
    resetBtn()
  }
}

function resetBtn() {
  document.getElementById('analyze-btn').disabled = false
  document.getElementById('status-box').style.display = 'none'
}

const STATUS_MSGS = [
  'Verificando headers HTTP...',
  'Analisando bundle JS...',
  'Testando Supabase RLS...',
  'Verificando edge functions...',
  'Checando storage público...',
  'Gerando prompts com IA...'
]
let msgIdx = 0

function pollStatus() {
  msgIdx = (msgIdx + 1) % STATUS_MSGS.length
  document.getElementById('status-text').textContent = STATUS_MSGS[msgIdx]
  pollTimer = setTimeout(async () => {
    try {
      const res = await fetch(`/status/${currentReportId}`)
      const data = await res.json()
      if (data.status === 'done') {
        loadReport()
      } else if (data.status === 'error') {
        showError('Erro durante a análise: ' + (data.error || 'desconhecido'))
        resetBtn()
      } else {
        pollStatus()
      }
    } catch { pollStatus() }
  }, 2000)
}

async function loadReport() {
  const res = await fetch(`/report/${currentReportId}`)
  currentReport = await res.json()
  renderReport(currentReport)
  document.getElementById('status-box').style.display = 'none'
  document.getElementById('report-section').style.display = 'block'
  document.getElementById('analyze-btn').disabled = false
}

function renderReport(report) {
  const score = report.score ?? 0
  document.getElementById('score-value').textContent = score
  const fill = document.getElementById('score-fill')
  fill.style.width = score + '%'
  fill.style.background = score >= 75 ? 'var(--critical)' : score >= 40 ? 'var(--high)' : score >= 15 ? 'var(--medium)' : 'var(--green)'

  const counts = { critical: 0, high: 0, medium: 0, low: 0, info: 0 }
  for (const f of report.findings) counts[f.severity] = (counts[f.severity] || 0) + 1
  const badgesRow = document.getElementById('badges-row')
  badgesRow.innerHTML = ''
  for (const [sev, count] of Object.entries(counts)) {
    if (count === 0) continue
    const b = document.createElement('span')
    b.className = `badge badge-${sev}`
    b.textContent = `${count} ${sev}`
    badgesRow.appendChild(b)
  }

  const list = document.getElementById('findings-list')
  list.innerHTML = ''
  const order = ['critical', 'high', 'medium', 'low', 'info']
  const sorted = [...report.findings].sort((a, b) => order.indexOf(a.severity) - order.indexOf(b.severity))
  for (const f of sorted) {
    const card = document.createElement('div')
    card.className = 'finding-card'
    card.innerHTML = `
      <div class="finding-header" onclick="toggleFinding(this)">
        <div class="severity-dot dot-${f.severity}"></div>
        <span class="finding-title">${escHtml(f.title)}</span>
        <span class="finding-sev-label">${f.severity}</span>
      </div>
      <div class="finding-body">
        <p><strong>Impacto:</strong> ${escHtml(f.impact)}</p>
        <div class="evidence">${escHtml(f.evidence)}</div>
      </div>`
    list.appendChild(card)
  }

  document.getElementById('prompts-content').textContent = report.prompts || '(sem prompts gerados)'
}

function toggleFinding(header) {
  const body = header.nextElementSibling
  body.classList.toggle('open')
}

function copyPrompts() {
  const text = document.getElementById('prompts-content').textContent
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target
    const orig = btn.textContent
    btn.textContent = 'Copiado!'
    setTimeout(() => { btn.textContent = orig }, 1500)
  })
}

function downloadReport() {
  if (!currentReport) return
  const content = [
    `# Relatório de Segurança — ${currentReport.url}`,
    `Data: ${new Date(currentReport.startedAt).toLocaleString('pt-BR')}`,
    `Score de risco: ${currentReport.score}/100`,
    '',
    '## Findings',
    ...currentReport.findings.map(f =>
      `### [${f.severity.toUpperCase()}] ${f.title}\n**Evidência:** \`${f.evidence}\`\n**Impacto:** ${f.impact}`
    ),
    '',
    '## Prompts para o Lovable',
    currentReport.prompts
  ].join('\n\n')
  const blob = new Blob([content], { type: 'text/markdown' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = `relatorio-seguranca-${Date.now()}.md`
  a.click()
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
</script>
</body>
</html>
